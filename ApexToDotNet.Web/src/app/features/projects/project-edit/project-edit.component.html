<!-- APEX Page 24 - Create / Edit Project (Dialog-style form) -->
<div class="apex-page">
  <div class="apex-page-title">
    <h1>{{ isEditMode ? 'Edit Project' : 'Create Project' }}</h1>
  </div>

  <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>

  <div class="apex-region">
    <div class="apex-region-body">
      <form [formGroup]="projectForm" (ngSubmit)="saveProject()">

        <!-- Initiative (Select One) -->
        <div class="apex-form-group">
          <label for="initiativeId">Initiative</label>
          <select id="initiativeId" formControlName="initiativeId">
            <option [ngValue]="null">- Select Initiative -</option>
            <option *ngFor="let i of initiatives" [ngValue]="i.id">{{ i.initiativeName }}</option>
          </select>
        </div>

        <!-- Project Name (Text) -->
        <div class="apex-form-group">
          <label for="projectName" class="required">Project</label>
          <input id="projectName" type="text" formControlName="projectName" placeholder="Enter project name">
        </div>

        <!-- Owner (Select One) -->
        <div class="apex-form-group">
          <label for="ownerId">Owner</label>
          <select id="ownerId" formControlName="ownerId">
            <option [ngValue]="null">- Select Owner -</option>
            <option *ngFor="let t of teamMembers" [ngValue]="t.id">{{ t.firstName }} {{ t.lastName }}</option>
          </select>
        </div>

        <div class="apex-form-row">
          <!-- Size (Radio Group) -->
          <div class="apex-form-group">
            <label>Size</label>
            <div class="radio-group">
              <label *ngFor="let s of sizes" class="radio-option">
                <input type="radio" formControlName="projectSize" [value]="s">
                <span>{{ s }}</span>
              </label>
            </div>
          </div>

          <!-- Priority (Select List) -->
          <div class="apex-form-group">
            <label for="priorityId">Priority</label>
            <select id="priorityId" formControlName="priorityId">
              <option [ngValue]="null">- Select -</option>
              <option *ngFor="let p of priorities" [ngValue]="p.id">P{{ p.priority }} {{ p.description || '' }}</option>
            </select>
          </div>
        </div>

        <div class="apex-form-row">
          <!-- Completeness (Select List 0-100%) -->
          <div class="apex-form-group">
            <label for="pctComplete">Completeness</label>
            <select id="pctComplete" formControlName="pctComplete">
              <option *ngFor="let p of pctOptions" [ngValue]="p">{{ p }}%</option>
            </select>
          </div>

          <!-- Status (Select List) -->
          <div class="apex-form-group">
            <label for="statusId">Status</label>
            <select id="statusId" formControlName="statusId">
              <option [ngValue]="null">- Select -</option>
              <option *ngFor="let s of statuses" [ngValue]="s.id">{{ s.status }}</option>
            </select>
          </div>
        </div>

        <div class="apex-form-row">
          <!-- Target Complete (Date Picker) -->
          <div class="apex-form-group">
            <label for="targetComplete">Target Complete</label>
            <input id="targetComplete" type="date" formControlName="targetComplete">
          </div>

          <!-- Release (Select One) -->
          <div class="apex-form-group">
            <label for="releaseId">Release</label>
            <select id="releaseId" formControlName="releaseId">
              <option [ngValue]="null">- Select Release -</option>
              <option *ngFor="let r of releases" [ngValue]="r.id">{{ r.releaseTrain }} {{ r.releaseName }}</option>
            </select>
          </div>
        </div>

        <!-- Tags (Text — simplified from APEX Combobox) -->
        <div class="apex-form-group">
          <label for="tags">Tags</label>
          <input id="tags" type="text" formControlName="tags" placeholder="Comma-separated tags">
        </div>

        <!-- Description (Textarea — simplified from Rich Text Editor) -->
        <div class="apex-form-group">
          <label for="description">Description</label>
          <textarea id="description" formControlName="description" rows="4" placeholder="Project description"></textarea>
        </div>

        <div class="apex-form-row">
          <!-- URL -->
          <div class="apex-form-group">
            <label for="url">URL</label>
            <input id="url" type="url" formControlName="url" placeholder="https://...">
          </div>

          <!-- Link Name -->
          <div class="apex-form-group">
            <label for="linkName">Link Name</label>
            <input id="linkName" type="text" formControlName="linkName" placeholder="Display text for URL">
          </div>
        </div>

        <!-- Button Bar (APEX dialog footer) -->
        <div class="apex-dialog-footer">
          <button type="button" routerLink="/sp-projects" class="apex-btn apex-btn-secondary">Cancel</button>
          <button *ngIf="isEditMode" type="button" class="apex-btn apex-btn-secondary" style="color:#c74634">Delete</button>
          <button type="submit" [disabled]="projectForm.invalid || isLoading" class="apex-btn apex-btn-hot">
            {{ isLoading ? 'Saving...' : (isEditMode ? 'Apply Changes' : 'Create Project') }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
